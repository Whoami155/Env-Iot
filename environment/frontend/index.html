<!DOCTYPE html>
<html>
<head>
    <title>Smart Classroom Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #020617, #0f172a);
            font-family: 'Inter', sans-serif;
            color: white;
        }

        header {
            padding: 18px;
            font-size: 22px;
            text-align: center;
            color: #38bdf8;
            font-weight: 600;
        }

        .section {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        /* 🔥 CARDS IN ONE ROW */
        .cards {
            display: flex;
            gap: 15px;
            flex-wrap: nowrap; /* prevents stacking */
        }

        .card {
            flex: 1;
            padding: 16px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            text-align: center;
            transition: 0.25s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.4);
        }

        .value {
            font-size: 24px;
            margin-top: 8px;
            font-weight: 600;
        }

        .last-seen {
            text-align: center;
            margin-top: 8px;
            opacity: 0.6;
            font-size: 13px;
        }

        /* 📊 GRAPH SECTION (VERTICAL) */
        .graph-section {
            margin-top: 30px;
        }

        .buttons {
            text-align: center;
            margin-bottom: 12px;
        }

        button {
            margin: 4px;
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            background: #38bdf8;
            cursor: pointer;
            font-size: 13px;
        }

        .graph-card {
            margin-top: 20px;
            padding: 14px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .graph-card h3 {
            margin-bottom: 6px;
            font-size: 14px;
            opacity: 0.8;
        }

        /* 🔥 COMPACT GRAPH SIZE */
        canvas {
            width: 100% !important;
            height: 160px !important;
        }

    </style>
</head>

<body>

<header>Smart Classroom Monitoring</header>

<!-- 🔴 LIVE DATA -->
<div class="section">
    <div class="cards">

        <div class="card">
            <h3>Temperature</h3>
            <div class="value" id="temp">-- °C</div>
        </div>

        <div class="card">
            <h3>Humidity</h3>
            <div class="value" id="hum">-- %</div>
        </div>

        <div class="card">
            <h3>Air Quality</h3>
            <div class="value" id="air">-- AQI</div>
        </div>

    </div>

    <div class="last-seen" id="lastSeen">
        Last seen: --
    </div>
</div>

<!-- 📊 GRAPHS (STACKED PROPERLY) -->
<div class="section graph-section">

    <div class="buttons">
        <button onclick="loadGraph('day')">Day</button>
        <button onclick="loadGraph('week')">Week</button>
    </div>

    <div class="graph-card">
        <h3>Temperature Trend (°C)</h3>
        <canvas id="tempGraph"></canvas>
    </div>

    <div class="graph-card">
        <h3>Humidity Trend (%)</h3>
        <canvas id="humGraph"></canvas>
    </div>

    <div class="graph-card">
        <h3>Air Quality Trend (AQI)</h3>
        <canvas id="airGraph"></canvas>
    </div>

</div>

<script>
const BASE_URL = "https://your-app.onrender.com"; // 🔥 CHANGE THIS

let tempChart, humChart, airChart;

// 🔄 LIVE DATA
async function fetchData() {
    let res = await fetch(BASE_URL + "/get-data");
    let data = await res.json();

    document.getElementById("temp").innerText = data.temperature + " °C";
    document.getElementById("hum").innerText = data.humidity + " %";
    document.getElementById("air").innerText = data.air + " AQI";

    document.getElementById("lastSeen").innerText =
        "Last seen: " + data.time;
}

// 📊 LOAD GRAPHS
async function loadGraph(period) {
    let res = await fetch(`${BASE_URL}/history?period=${period}`);
    let data = await res.json();

    let labels = data.map(d => d.time);

    let temp = data.map(d => d.temperature);
    let hum = data.map(d => d.humidity);
    let air = data.map(d => d.air);

    if (tempChart) tempChart.destroy();
    if (humChart) humChart.destroy();
    if (airChart) airChart.destroy();

    tempChart = new Chart(document.getElementById("tempGraph"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: "Temperature (°C)",
                data: temp,
                borderColor: "#ef4444",
                tension: 0.4
            }]
        }
    });

    humChart = new Chart(document.getElementById("humGraph"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: "Humidity (%)",
                data: hum,
                borderColor: "#3b82f6",
                tension: 0.4
            }]
        }
    });

    airChart = new Chart(document.getElementById("airGraph"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: "Air Quality (AQI)",
                data: air,
                borderColor: "#22c55e",
                tension: 0.4
            }]
        }
    });
}

// ⏱️ AUTO UPDATE
setInterval(fetchData, 2000);

// Default graph
loadGraph('day');
</script>

</body>
</html>
